<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1067" preserveAspectRatio="xMidYMid slice">
<defs>
  <filter id="blur-xl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="32"/></filter>
  <filter id="blur-lg" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="18"/></filter>
  <filter id="blur-md" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="9"/></filter>
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.70" numOctaves="4" stitchTiles="stitch" result="n"/>
    <feColorMatrix type="saturate" values="0" in="n"/>
    <feBlend in="SourceGraphic" mode="multiply"/>
  </filter>
  <radialGradient id="vig" cx="50%" cy="50%" r="70%">
    <stop offset="28%" stop-color="#040301" stop-opacity="0"/>
    <stop offset="100%" stop-color="#040301" stop-opacity="0.94"/>
  </radialGradient>
  <radialGradient id="glow" cx="50%" cy="52%" r="46%">
    <stop offset="0%" stop-color="#ECA050" stop-opacity="0.82"/>
    <stop offset="50%" stop-color="#C05A22" stop-opacity="0.36"/>
    <stop offset="100%" stop-color="#040301" stop-opacity="0"/>
  </radialGradient>
</defs>

<rect width="800" height="1067" fill="#0D0802"/>

<!-- seated meditation / sauna pose – cross-legged, upright, peaceful -->

<!-- mat glow -->
<ellipse cx="400" cy="900" rx="380" ry="65" fill="#C85D2C" opacity="0.15" filter="url(#blur-xl)"/>

<!-- crossed legs / lower body on floor -->
<g filter="url(#blur-xl)">
  <ellipse cx="400" cy="800" rx="240" ry="100" fill="#B05028" opacity="0.55"/>
  <ellipse cx="400" cy="810" rx="180" ry="78" fill="#C06030" opacity="0.45"/>
  <!-- feet -->
  <ellipse cx="215" cy="820" rx="75" ry="50" fill="#C07030" opacity="0.5"/>
  <ellipse cx="585" cy="820" rx="72" ry="48" fill="#B86828" opacity="0.48"/>
</g>

<!-- hips/base seated -->
<g filter="url(#blur-lg)">
  <ellipse cx="400" cy="710" rx="120" ry="88" fill="#C86030" opacity="0.62"/>
  <ellipse cx="400" cy="705" rx="80"  ry="60" fill="#D88040" opacity="0.48"/>
</g>

<!-- torso upright -->
<g filter="url(#blur-lg)">
  <ellipse cx="400" cy="555" rx="95"  ry="165" fill="#C06030" opacity="0.58"/>
  <ellipse cx="400" cy="545" rx="62"  ry="115" fill="#D88048" opacity="0.44"/>
</g>

<!-- arms resting on knees – hands in mudra -->
<g filter="url(#blur-md)">
  <!-- left arm down to left knee -->
  <ellipse cx="275" cy="680" rx="38" ry="130" fill="#B85828" opacity="0.6" transform="rotate(25 275 680)"/>
  <ellipse cx="228" cy="765" rx="42" ry="32"  fill="#C87038" opacity="0.5"/>
  <!-- right arm down to right knee -->
  <ellipse cx="525" cy="678" rx="36" ry="128" fill="#B05828" opacity="0.56" transform="rotate(-25 525 678)"/>
  <ellipse cx="572" cy="762" rx="40" ry="30"  fill="#C07030" opacity="0.48"/>
</g>

<!-- neck + head slightly bowed / peaceful -->
<g filter="url(#blur-md)">
  <ellipse cx="400" cy="390" rx="35" ry="72" fill="#D07840" opacity="0.68"/>
  <ellipse cx="400" cy="300" rx="84" ry="95" fill="#C87040" opacity="0.65" transform="rotate(4 400 300)"/>
  <ellipse cx="404" cy="288" rx="56" ry="65" fill="#E09868" opacity="0.47"/>
  <!-- slight chin drop – peaceful -->
  <ellipse cx="400" cy="360" rx="42" ry="32" fill="#E09868" opacity="0.32"/>
  <!-- hair up/bun -->
  <ellipse cx="400" cy="218" rx="60" ry="65" fill="#1C0E04" opacity="0.88"/>
  <ellipse cx="400" cy="195" rx="45" ry="42" fill="#160A02" opacity="0.9"/>
</g>

<!-- steam/heat wisps – atmospheric -->
<g filter="url(#blur-xl)" opacity="0.3">
  <ellipse cx="360" cy="250" rx="30" ry="120" fill="#E09050"/>
  <ellipse cx="430" cy="220" rx="25" ry="110" fill="#D88040"/>
  <ellipse cx="310" cy="290" rx="22" ry="90"  fill="#C87030"/>
</g>

<g filter="url(#blur-xl)">
  <ellipse cx="400" cy="530" rx="210" ry="280" fill="#E07838" opacity="0.38"/>
</g>

<rect width="800" height="1067" fill="url(#glow)" opacity="0.62"/>
<ellipse cx="400" cy="980" rx="420" ry="88" fill="#C85D2C" opacity="0.13" filter="url(#blur-xl)"/>
<ellipse cx="400" cy="930" rx="290" ry="64" fill="#030201" opacity="0.68" filter="url(#blur-xl)"/>
<rect width="800" height="1067" fill="url(#vig)"/>
<rect width="800" height="1067" fill="#E07030" opacity="0.022" filter="url(#grain)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1067" preserveAspectRatio="xMidYMid slice">
<defs>
  <filter id="blur-xl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="26"/></filter>
  <filter id="blur-lg" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="14"/></filter>
  <filter id="blur-md" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="7"/></filter>
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.70" numOctaves="4" stitchTiles="stitch" result="n"/>
    <feColorMatrix type="saturate" values="0" in="n" result="g"/>
    <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
  </filter>
  <radialGradient id="vig" cx="50%" cy="50%" r="70%">
    <stop offset="28%" stop-color="#060301" stop-opacity="0"/>
    <stop offset="100%" stop-color="#060301" stop-opacity="0.92"/>
  </radialGradient>
  <radialGradient id="glow" cx="48%" cy="44%" r="42%">
    <stop offset="0%" stop-color="#EEA460" stop-opacity="0.82"/>
    <stop offset="48%" stop-color="#C05C28" stop-opacity="0.38"/>
    <stop offset="100%" stop-color="#060301" stop-opacity="0"/>
  </radialGradient>
</defs>

<rect width="800" height="1067" fill="#100904"/>

<!-- legs – warrior lunge -->
<g filter="url(#blur-xl)">
  <!-- front leg forward -->
  <ellipse cx="430" cy="850" rx="70" ry="200" fill="#B05028" opacity="0.6" transform="rotate(-8 430 850)"/>
  <!-- back leg extended -->
  <ellipse cx="260" cy="820" rx="55" ry="220" fill="#A04820" opacity="0.5" transform="rotate(22 260 820)"/>
  <!-- feet/lower -->
  <ellipse cx="460" cy="1000" rx="65" ry="55" fill="#1A0C04" opacity="0.7"/>
  <ellipse cx="190" cy="980" rx="60" ry="50" fill="#1A0C04" opacity="0.65"/>
</g>

<!-- hips/pelvis -->
<g filter="url(#blur-lg)">
  <ellipse cx="370" cy="680" rx="130" ry="95" fill="#C06030" opacity="0.62"/>
  <ellipse cx="365" cy="670" rx="90"  ry="68" fill="#D07840" opacity="0.48"/>
</g>

<!-- torso -->
<g filter="url(#blur-lg)">
  <ellipse cx="380" cy="510" rx="100" ry="170" fill="#C06030" opacity="0.58" transform="rotate(-4 380 510)"/>
  <ellipse cx="385" cy="500" rx="65"  ry="120" fill="#D88048" opacity="0.45"/>
</g>

<!-- arms raised overhead – warrior -->
<g filter="url(#blur-md)">
  <!-- left arm up -->
  <ellipse cx="310" cy="330" rx="38" ry="150" fill="#C06030" opacity="0.6" transform="rotate(-12 310 330)"/>
  <!-- right arm up -->
  <ellipse cx="450" cy="320" rx="36" ry="155" fill="#B85830" opacity="0.55" transform="rotate(14 450 320)"/>
  <!-- hands -->
  <ellipse cx="295" cy="185" rx="32" ry="28" fill="#D07838" opacity="0.5"/>
  <ellipse cx="465" cy="175" rx="30" ry="28" fill="#C87038" opacity="0.48"/>
</g>

<!-- neck + head -->
<g filter="url(#blur-md)">
  <ellipse cx="382" cy="385" rx="36" ry="75" fill="#D07840" opacity="0.68"/>
  <ellipse cx="385" cy="295" rx="82" ry="92" fill="#C87040" opacity="0.65"/>
  <ellipse cx="390" cy="280" rx="55" ry="62" fill="#E09868" opacity="0.48"/>
  <!-- hair -->
  <ellipse cx="388" cy="218" rx="88" ry="55" fill="#1C0E04" opacity="0.82"/>
</g>

<!-- glow layers -->
<g filter="url(#blur-xl)">
  <ellipse cx="385" cy="500" rx="200" ry="280" fill="#E07838" opacity="0.38"/>
  <ellipse cx="385" cy="850" rx="170" ry="200" fill="#C05E28" opacity="0.28"/>
</g>

<rect width="800" height="1067" fill="url(#glow)" opacity="0.6"/>
<ellipse cx="385" cy="1020" rx="360" ry="90" fill="#C85D2C" opacity="0.12" filter="url(#blur-xl)"/>
<ellipse cx="385" cy="950"  rx="300" ry="70" fill="#050302" opacity="0.7"  filter="url(#blur-xl)"/>

<rect width="800" height="1067" fill="url(#vig)"/>
<rect width="800" height="1067" fill="#E07030" opacity="0.025" filter="url(#grain)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1067" preserveAspectRatio="xMidYMid slice">
<defs>
  <filter id="blur-xl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="26"/></filter>
  <filter id="blur-lg" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="14"/></filter>
  <filter id="blur-md" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="6"/></filter>
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.68" numOctaves="4" stitchTiles="stitch" result="n"/>
    <feColorMatrix type="saturate" values="0" in="n"/>
    <feBlend in="SourceGraphic" mode="multiply"/>
  </filter>
  <radialGradient id="vig" cx="50%" cy="50%" r="70%">
    <stop offset="28%" stop-color="#060302" stop-opacity="0"/>
    <stop offset="100%" stop-color="#060302" stop-opacity="0.92"/>
  </radialGradient>
  <radialGradient id="glow" cx="45%" cy="52%" r="42%">
    <stop offset="0%" stop-color="#F0A860" stop-opacity="0.82"/>
    <stop offset="46%" stop-color="#C46028" stop-opacity="0.38"/>
    <stop offset="100%" stop-color="#060302" stop-opacity="0"/>
  </radialGradient>
</defs>

<rect width="800" height="1067" fill="#100803"/>

<!-- pilates – figure on back, legs raised vertical (the hundred / leg raise) -->

<!-- floor -->
<ellipse cx="400" cy="940" rx="500" ry="80" fill="#1A0C05" opacity="0.7" filter="url(#blur-xl)"/>

<!-- body lying on back – torso horizontal -->
<g filter="url(#blur-xl)">
  <ellipse cx="350" cy="750" rx="280" ry="90"  fill="#B85028" opacity="0.52" transform="rotate(-2 350 750)"/>
  <ellipse cx="320" cy="730" rx="200" ry="70"  fill="#C86030" opacity="0.46" transform="rotate(-2 320 730)"/>
</g>

<!-- shoulder blades / upper back on floor -->
<g filter="url(#blur-lg)">
  <ellipse cx="180" cy="710" rx="145" ry="88" fill="#C86030" opacity="0.6"/>
  <ellipse cx="165" cy="695" rx="95"  ry="62" fill="#D87840" opacity="0.48"/>
</g>

<!-- arms extended alongside body / slightly raised -->
<g filter="url(#blur-lg)">
  <ellipse cx="120" cy="760" rx="115" ry="38" fill="#B05028" opacity="0.55" transform="rotate(-10 120 760)"/>
  <ellipse cx="560" cy="770" rx="100" ry="36" fill="#A84A22" opacity="0.5"  transform="rotate(8 560 770)"/>
</g>

<!-- hips -->
<g filter="url(#blur-lg)">
  <ellipse cx="490" cy="720" rx="100" ry="75" fill="#C06030" opacity="0.62"/>
</g>

<!-- legs raised – two legs vertical / slightly apart -->
<g filter="url(#blur-lg)">
  <!-- left leg up -->
  <ellipse cx="460" cy="520" rx="52" ry="190" fill="#B85028" opacity="0.62" transform="rotate(-6 460 520)"/>
  <!-- right leg up -->
  <ellipse cx="540" cy="510" rx="50" ry="200" fill="#B05028" opacity="0.56" transform="rotate(8 540 510)"/>
  <!-- feet -->
  <ellipse cx="450" cy="330" rx="40" ry="35" fill="#C87038" opacity="0.5"/>
  <ellipse cx="548" cy="315" rx="38" ry="34" fill="#C07030" opacity="0.48"/>
</g>

<!-- head slightly raised (chin to chest) -->
<g filter="url(#blur-md)">
  <ellipse cx="125" cy="660" rx="80" ry="90" fill="#C87040" opacity="0.65" transform="rotate(15 125 660)"/>
  <ellipse cx="130" cy="652" rx="54" ry="62" fill="#E09868" opacity="0.46" transform="rotate(15 130 652)"/>
  <!-- hair spread on floor -->
  <ellipse cx="95"  cy="638" rx="100" ry="52" fill="#1C0E04" opacity="0.8" transform="rotate(10 95 638)"/>
</g>

<g filter="url(#blur-xl)">
  <ellipse cx="380" cy="600" rx="220" ry="260" fill="#E07838" opacity="0.36"/>
  <ellipse cx="180" cy="700" rx="190" ry="130" fill="#C05E28" opacity="0.3"/>
</g>

<rect width="800" height="1067" fill="url(#glow)" opacity="0.62"/>
<ellipse cx="400" cy="990" rx="460" ry="95" fill="#C85D2C" opacity="0.12" filter="url(#blur-xl)"/>
<ellipse cx="400" cy="910"  rx="320" ry="68" fill="#040302" opacity="0.68" filter="url(#blur-xl)"/>
<rect width="800" height="1067" fill="url(#vig)"/>
<rect width="800" height="1067" fill="#E07030" opacity="0.022" filter="url(#grain)"/>
</svg>
